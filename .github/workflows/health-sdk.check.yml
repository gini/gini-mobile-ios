name: Check Health SDK
permissions:
  contents: read
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    paths:
      - 'HealthSDK/**'
      - 'HealthAPILibrary/**'
  workflow_call:
    secrets:
      GINI_MOBILE_TEST_CLIENT_SECRET:
        required: true
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-check
  cancel-in-progress: ${{ !contains(github.ref, 'refs/tags/')}}

jobs:
  get-config:
    uses: ./.github/workflows/shared-config.yml

  check:
    needs: get-config
    runs-on: macos-latest
    strategy:
      matrix:
        target: [GiniHealthSDK, GiniHealthSDKExampleTests]
        destination: ['${{ needs.get-config.outputs.ios-simulator-destination }}']

    steps:
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: ${{ needs.get-config.outputs.xcode-version }}

    - name: Checkout
      uses: actions/checkout@v4

    - name: Check package GiniHealthSDK
      if: ${{ matrix.target == 'GiniHealthSDK' }}
      run: |
           cd HealthSDK/GiniHealthSDK
           swift package update
  
    # Setup ruby to run unit tests for the GiniBankSDK
    - name: Setup ruby
      uses: ruby/setup-ruby@dffc446db9ba5a0c4446edb5bca1c5c473a806c5 # v1.245.0
      with:
        ruby-version: ${{ needs.get-config.outputs.ruby-version }}
        bundler-cache: true

    - name: Build and run tests for "${{ matrix.target }}"
      uses: maierj/fastlane-action@5a3b971aaa26776459bb26894d6c1a1a84a311a7 # v3.1.0
      env:
        TEST_CLIENT_SECRET: ${{ secrets.GINI_MOBILE_CI_PASSWORD }}
        TEST_CLIENT_ID: ${{ secrets.GINI_MOBILE_CI_USERNAME }}
      with:
        lane: 'run_unit_tests'
        options: >
            {
              "target": "${{ matrix.target }}",
              "destination": "${{ matrix.destination }}",
              "clientId": "$TEST_CLIENT_ID",
              "clientSecret": "$TEST_CLIENT_SECRET",
              "result_bundle_path": "sonar-coverage.xcresult"
            }

    - name: Convert coverage to SonarQube generic format
      if: ${{ matrix.target == 'GiniHealthSDK' }}
      run: |
        bash scripts/xccov-to-sonarqube-generic.sh sonar-coverage.xcresult \
          | sed 's|path="[^"]*HealthSDK/|path="|g' \
          > HealthSDK/coverage.xml

    - name: Upload coverage report
      if: ${{ matrix.target == 'GiniHealthSDK' }}
      uses: actions/upload-artifact@v4
      with:
        name: sonar-coverage-health-sdk
        path: HealthSDK/coverage.xml
        retention-days: 1

  sonarqube:
    name: SonarQube
    needs: check
    uses: ./.github/workflows/sonarqube.yml
    with:
      project_base_dir: HealthSDK
      coverage_artifact_name: sonar-coverage-health-sdk
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
