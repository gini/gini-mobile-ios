name: SonarQube Scan
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      project_base_dir:
        description: 'Directory containing sonar-project.properties'
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true

jobs:
  sonarqube:
    name: SonarQube
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.project_base_dir }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
