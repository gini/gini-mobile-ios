name: Check Gini Utilites
permissions:
  contents: read
on:
  pull_request:
   types: [opened, reopened, synchronize, ready_for_review]
   paths:
      - 'GiniComponents/GiniUtilites/**'
  workflow_call:
  workflow_dispatch:

jobs:
  get-config:
    uses: ./.github/workflows/shared-config.yml

  check:
    needs: get-config
    runs-on: macos-latest
    strategy:
      matrix:
        target: [GiniUtilites]
        destination: ['${{ needs.get-config.outputs.ios-simulator-destination }}']
    steps:
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: ${{ needs.get-config.outputs.xcode-version }}

    - name: Checkout
      uses: actions/checkout@v4

    - name: Check package GiniUtilites
      run: |
           cd GiniComponents/GiniUtilites
           swift package update
  
  # Build the GiniUtilities target to verify compilation
    - name: Setup ruby
      uses: ruby/setup-ruby@dffc446db9ba5a0c4446edb5bca1c5c473a806c5 # v1.245.0
      with:
        ruby-version: ${{ needs.get-config.outputs.ruby-version }}
        bundler-cache: true

    - name: Build "${{ matrix.target }}"
      uses: maierj/fastlane-action@5a3b971aaa26776459bb26894d6c1a1a84a311a7 # v3.1.0
      with:
        lane: 'build_scheme'
        options: >
            {
              "target": "${{ matrix.target }}",
              "destination": "${{ matrix.destination }}"
            }