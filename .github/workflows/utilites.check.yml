name: Check Gini Utilites
permissions:
  contents: read
on:
  pull_request:
   types: [opened, reopened, synchronize, ready_for_review]
   paths:
      - 'GiniComponents/Utilities/GiniUtilites/**'
  workflow_call:
  workflow_dispatch:

jobs:
  get-config:
    uses: ./.github/workflows/shared-config.yml

  check:
    needs: get-config
    runs-on: macos-latest
    strategy:
      matrix:
        target: [GiniUtilites]
        destination: ['${{ needs.get-config.outputs.ios-simulator-destination }}']
    steps:
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: ${{ needs.get-config.outputs.xcode-version }}

    - name: Checkout
      uses: actions/checkout@v4

    - name: Check package GiniUtilites
      run: |
           cd GiniComponents/Utilities/GiniUtilites
           swift package update
  
  # Build the GiniUtilities target to verify compilation
    - name: Setup ruby
      uses: ruby/setup-ruby@dffc446db9ba5a0c4446edb5bca1c5c473a806c5 # v1.245.0
      with:
        ruby-version: ${{ needs.get-config.outputs.ruby-version }}
        bundler-cache: true

  sonarqube:
    name: SonarQube
    needs: check
    uses: ./.github/workflows/sonarqube.yml
    with:
      project_base_dir: GiniComponents/Utilities
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}