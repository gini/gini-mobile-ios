name: Check Gini Utilites
permissions:
  contents: read
on:
  pull_request:
   types: [opened, reopened, synchronize, ready_for_review]
   paths:
      - 'GiniComponents/GiniUtilites/**'
  workflow_call:
  workflow_dispatch:

jobs:
  check:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [GiniUtilites]
        destination: ['platform=iOS Simulator,OS=18.5,name=iPhone 16']
    steps:
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: '16.4'

    - name: Checkout
      uses: actions/checkout@v4

    - name: Check package GiniUtilites
      run: |
           cd GiniComponents/GiniUtilites
           swift package update
  
  # Build the GiniUtilities target to verify compilation
    - name: Setup ruby
      uses: ruby/setup-ruby@dffc446db9ba5a0c4446edb5bca1c5c473a806c5 # v1.245.0
      with:
        ruby-version: '3.2.0'
        bundler-cache: true

    - name: Build "${{ matrix.target }}"
      uses: maierj/fastlane-action@5a3b971aaa26776459bb26894d6c1a1a84a311a7 # v3.1.0
      with:
        lane: 'run_unit_tests'
        options: >
            {
              "target": "${{ matrix.target }}",
              "destination": "${{ matrix.destination }}",
              "result_bundle_path": "sonar-coverage.xcresult"
            }

    - name: Convert coverage to SonarQube generic format
      if: ${{ matrix.target == 'GiniUtilites' }}
      run: |
        bash scripts/xccov-to-sonarqube-generic.sh sonar-coverage.xcresult > GiniComponents/coverage.xml

    - name: Upload coverage report
      if: ${{ matrix.target == 'GiniUtilites' }}
      uses: actions/upload-artifact@v4
      with:
        name: sonar-coverage-gini-components
        path: GiniComponents/coverage.xml
        retention-days: 1

  sonarqube:
    name: SonarQube
    needs: check
    uses: ./.github/workflows/sonarqube.yml
    with:
      project_base_dir: GiniComponents
      coverage_artifact_name: sonar-coverage-gini-components
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}