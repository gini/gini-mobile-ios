name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 06:00 UTC

jobs:
  analyze-swift:
    name: Analyze Swift
    runs-on: macos-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
      with:
        xcode-version: '16.4'

    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@58d4c8134bcf8ae089f888d056501755e0da2b44 # v4
      with:
        languages: swift

    - name: Setup ruby
      uses: ruby/setup-ruby@dffc446db9ba5a0c4446edb5bca1c5c473a806c5 # v1.245.0
      with:
        ruby-version: '3.3.0'
        bundler-cache: true

    - name: Build GiniBankSDKExample
      uses: maierj/fastlane-action@5a3b971aaa26776459bb26894d6c1a1a84a311a7 # v3.1.0
      with:
        lane: 'build_scheme'
        options: >
          {
            "target": "GiniBankSDKExample",
            "destination": "platform=iOS Simulator,OS=18.5,name=iPhone 16"
          }

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@58d4c8134bcf8ae089f888d056501755e0da2b44 # v4
      with:
        category: "/language:swift"

  analyze-ruby:
    name: Analyze Ruby
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@58d4c8134bcf8ae089f888d056501755e0da2b44 # v4
      with:
        languages: ruby

    - name: Autobuild
      uses: github/codeql-action/autobuild@58d4c8134bcf8ae089f888d056501755e0da2b44 # v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@58d4c8134bcf8ae089f888d056501755e0da2b44 # v4
      with:
        category: "/language:ruby"

  analyze-actions:
    name: Analyze Actions
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@58d4c8134bcf8ae089f888d056501755e0da2b44 # v4
      with:
        languages: actions

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@58d4c8134bcf8ae089f888d056501755e0da2b44 # v4
      with:
        category: "/language:actions"
